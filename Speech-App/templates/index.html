<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Azure Speech Services - EE471</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="container">
        <header>
            <h1><i class="fa-solid fa-microphone"></i> Azure Speech Services</h1>
            <p class="subtitle">Text-to-Speech & Speech-to-Text powered by Azure Cognitive Services</p>
        </header>

        <div class="tabs">
            <button class="tab-btn active" id="tab-tts">Text to Speech</button>
            <button class="tab-btn" id="tab-stt">Speech to Text</button>
        </div>

        <main>
            <!-- TEXT TO SPEECH SECTION -->
            <div id="section-tts">
                <div class="input-section">
                    <label for="text-input">Enter text to convert to speech:</label>
                    <textarea id="text-input" placeholder="Hello, EE471 class"></textarea>
                </div>

                <div class="button-group">
                    <button id="synthesize-btn" class="btn-primary">
                        <i class="fa-solid fa-volume-high"></i> Synthesize Speech
                    </button>
                    <button id="clear-tts-btn" class="btn-secondary">Clear</button>
                </div>

                <div id="status-message-tts" class="status-message hidden"></div>

                <div id="audio-output" class="audio-panel hidden">
                    <h3>Generated Audio:</h3>
                    <audio id="audio-player" controls>
                        <source src="" type="audio/wav">
                    </audio>
                    <a id="download-btn" href="#" download="audio.wav" class="btn-primary btn-block">
                        <i class="fa-solid fa-download"></i> Download Audio
                    </a>
                </div>
            </div>

            <!-- SPEECH TO TEXT SECTION -->
            <div id="section-stt" class="hidden">
                <div class="input-section">
                    <label>Record or upload audio to convert to text:</label>
                    <div class="audio-controls">
                        <button id="start-record-btn" class="btn-primary" style="background-color:#7251b5;"><i class="fa-solid fa-microphone"></i> Start</button>
                        <button id="stop-record-btn" class="btn-danger" disabled><i class="fa-solid fa-square"></i> Stop</button>
                        <input type="file" id="audio-file" accept="audio/*">
                    </div>
                </div>

                <div id="status-message-stt" class="status-message hidden"></div>

                <div class="button-group">
                    <button id="transcribe-btn" class="btn-primary">
                        <i class="fa-solid fa-file-audio"></i> Transcribe Audio
                    </button>
                    <button id="clear-stt-btn" class="btn-secondary">Clear</button>
                </div>

                <div class="output-panel">
                    <label>Transcription:</label>
                    <textarea id="transcription-output" readonly placeholder="Your transcribed text will appear here."></textarea>
                    <button id="copy-btn" class="btn-secondary" style="width:auto; margin-top:10px;"><i class="fa-regular fa-copy"></i> Copy Text</button>
                </div>
            </div>
        </main>
    </div>

    <script src="{{ url_for('static', filename='app.js') }}"></script>
</body>
</html>
